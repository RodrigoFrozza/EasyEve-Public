<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="planetGradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <style>
      .text { font-family: 'Inter', system-ui, sans-serif; fill: white; }
      .light { font-weight: 200; }
      .bold { font-weight: 700; }
      .tracking { letter-spacing: 0.1em; }
    </style>
  </defs>
  
  <!-- Void Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Subtle StarField (just a few dots) -->
  <circle cx="200" cy="150" r="1" fill="white" fill-opacity="0.3"/>
  <circle cx="900" cy="100" r="1.5" fill="white" fill-opacity="0.2"/>
  <circle cx="1000" cy="450" r="1" fill="white" fill-opacity="0.4"/>
  <circle cx="150" cy="500" r="1" fill="white" fill-opacity="0.1"/>
  <circle cx="500" cy="50" r="1.2" fill="white" fill-opacity="0.2"/>
  
  <!-- Dark Planet Logo -->
  <g transform="translate(600, 220)">
    <circle r="120" fill="black"/>
    <circle r="120" fill="url(#planetGradient)"/>
    <circle r="119.5" fill="none" stroke="white" stroke-opacity="0.1"/>
    <text y="30" font-size="120" class="text bold" text-anchor="middle" style="letter-spacing: -0.05em">E</text>
  </g>
  
  <!-- Branding Text -->
  <text x="600" y="420" font-size="64" class="text light tracking" text-anchor="middle" style="text-transform: uppercase;">EasyEve</text>
  <text x="600" y="480" font-size="24" class="text light" fill-opacity="0.4" text-anchor="middle" style="letter-spacing: 0.3em; text-transform: uppercase;">Deep Space Management</text>
  
  <!-- Features -->
  <text x="600" y="550" font-size="18" class="text light" fill-opacity="0.3" text-anchor="middle" style="letter-spacing: 0.1em;">MINING • COMBAT • FLEET • EXPLORATION</text>
</svg>